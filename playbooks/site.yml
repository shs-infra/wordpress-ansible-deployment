- name: Basic web server setup
  hosts: web
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: true

    - name: Create simple index page
      copy:
        content: "<h1>Deployed with Ansible</h1>"
        dest: /var/www/html/index.html